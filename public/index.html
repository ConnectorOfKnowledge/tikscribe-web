<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tikscribe</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>tikscribe</h1>
            <p class="subtitle">Paste a URL. Get a transcript.</p>
        </header>

        <!-- Submit Form -->
        <section id="submit-section">
            <div class="input-group">
                <input type="url" id="url-input" placeholder="Paste TikTok or YouTube URL..." autocomplete="off">
                <button id="submit-btn" onclick="submitUrl()">Transcribe</button>
            </div>
            <p class="hint">Works with TikTok, YouTube, Instagram Reels, and more</p>

            <!-- Notes -->
            <textarea id="notes-input" placeholder="Add notes... (optional)" rows="2"></textarea>

            <!-- File Upload -->
            <div class="upload-area" id="upload-area">
                <input type="file" id="file-input" accept="image/*" multiple hidden>
                <button class="btn-upload" onclick="document.getElementById('file-input').click()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Attach Screenshots
                </button>
                <div id="file-previews" class="file-previews"></div>
            </div>
        </section>

        <!-- Processing Status -->
        <section id="status-section" class="hidden">
            <div class="status-card">
                <div class="spinner"></div>
                <p id="status-text">Submitting...</p>
                <p id="status-detail" class="detail"></p>
            </div>
        </section>

        <!-- Result -->
        <section id="result-section" class="hidden">
            <div class="result-card">
                <div class="result-header">
                    <img id="result-thumb" class="thumbnail" alt="Video thumbnail">
                    <div>
                        <h2 id="result-title"></h2>
                        <p id="result-meta" class="meta"></p>
                        <div id="result-categories" class="categories"></div>
                    </div>
                </div>
                <div id="result-notes-box" class="notes-box hidden">
                    <h3>Notes</h3>
                    <div id="result-notes"></div>
                </div>
                <div id="result-attachments-box" class="attachments-box hidden">
                    <h3>Attachments</h3>
                    <div id="result-attachments" class="attachment-grid"></div>
                </div>
                <div class="transcript-box">
                    <h3>Transcript</h3>
                    <div id="result-transcript"></div>
                </div>
                <button class="btn-secondary" onclick="copyTranscript()">Copy Transcript</button>
                <button class="btn-secondary" onclick="resetForm()">Transcribe Another</button>
            </div>
        </section>

        <!-- Active Transcripts (unreviewed) -->
        <section id="history-section">
            <h2 class="section-title">Pending Review</h2>
            <div id="history-list" class="history-list">
                <p class="empty-state">No transcripts yet. Paste a URL above to get started.</p>
            </div>
        </section>

        <!-- Archived Transcripts (reviewed) -->
        <section id="archive-section" style="display: none;">
            <h2 class="section-title archive-title" onclick="toggleArchive()">
                Archive
                <span id="archive-toggle" class="archive-toggle">Show</span>
            </h2>
            <div id="archive-list" class="history-list archive-list hidden"></div>
        </section>
    </div>

    <!-- TicketDeck Bug Widget -->
    <button id="bug-fab" onclick="toggleBugPanel()" title="Report a Bug">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
    </button>

    <div id="bug-panel" class="bug-panel hidden">
        <div class="bug-panel-header">
            <h3>Report an Issue</h3>
            <button class="bug-close" onclick="toggleBugPanel()">&times;</button>
        </div>
        <form id="bug-form" onsubmit="submitBugTicket(event)">
            <input type="text" id="bug-title" placeholder="Short title..." required>
            <textarea id="bug-desc" placeholder="Describe the issue..." rows="3"></textarea>
            <div class="bug-row">
                <select id="bug-type">
                    <option value="bug">Bug</option>
                    <option value="feature">Feature</option>
                    <option value="ui_ux">UI/UX</option>
                    <option value="performance">Performance</option>
                    <option value="other">Other</option>
                </select>
                <select id="bug-priority">
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                    <option value="high">High</option>
                </select>
            </div>
            <button type="submit" id="bug-submit-btn" class="bug-submit">Submit Ticket</button>
        </form>
        <p id="bug-status" class="bug-status-msg hidden"></p>
    </div>

    <script src="/app.js"></script>
</body>
</html>
